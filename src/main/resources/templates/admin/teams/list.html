<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>チーム・部署管理 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/admin/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート 管理者</span>
			</a>
			<nav class="nav-actions">
				<a href="/admin/dashboard" class="btn btn-ghost">ダッシュボード</a>
				<a href="/admin/users" class="btn btn-ghost">ユーザー管理</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-header">
				<div>
					<p class="eyebrow">Admin / Teams</p>
					<h1>チーム・部署管理</h1>
				</div>
				<a href="/admin/teams/create" class="btn btn-primary">＋ 新しいチーム</a>
			</div>

			<div class="panel">
				<ul class="milestone-list" th:if="${teams != null and !#lists.isEmpty(teams)}">
					<li class="milestone-item" th:each="team : ${teams}">
						<div class="milestone-main">
							<p class="milestone-title">
								<a th:href="@{/admin/teams/{id}(id=${team.id})}" th:text="${team.name}"
								   style="text-decoration:none; color:inherit;"></a>
							</p>
							<div class="milestone-meta">
								<span th:text="(${team.teamMembers != null ? #sets.size(team.teamMembers) : 0}) + '人のメンバー'"></span>
								<span th:text="(${team.projects != null ? #lists.size(team.projects) : 0}) + '件のプロジェクト'"></span>
							</div>
						</div>
					</li>
				</ul>

				<div class="empty-state" th:if="${teams == null or #lists.isEmpty(teams)}">
					<p>登録されているチームがありません。</p>
					<a href="/admin/teams/create" class="btn btn-primary">最初のチームを作る</a>
				</div>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
		</div>
	</footer>

</body>

</html>
