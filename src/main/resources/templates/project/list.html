<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>プロジェクト一覧 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a href="/dashboard" class="btn btn-ghost">ダッシュボード</a>
				<a href="/settings/integration" class="btn btn-ghost">設定</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-header">
				<div>
					<p class="eyebrow">Projects</p>
					<h1>プロジェクト</h1>
				</div>
				<a href="/projects/create" class="btn btn-primary">新しいプロジェクト</a>
			</div>

			<div class="project-grid" th:if="${projects != null and !#lists.isEmpty(projects)}">
				<a class="project-card" th:each="project : ${projects}" th:href="@{/projects/{id}(id=${project.id})}">
					<div class="project-card-head">
						<h3 th:text="${project.name}">プロジェクト名</h3>
						<span th:class="${'status-badge ' +
							(project.status == 'IN_PROGRESS' ? 'status-in-progress' :
							(project.status == 'COMPLETED' ? 'status-completed' : 'status-not-started'))}"
							th:text="${project.status}">NOT_STARTED</span>
					</div>
					<div class="project-meta">
						<p class="meta-row" th:if="${project.team != null}">
							<span class="meta-label">Team</span>
							<span th:text="${project.team.name}">チーム名</span>
						</p>
						<p class="meta-row">
							<span class="meta-label">Period</span>
							<span>
								<span th:if="${project.startDate != null}"
									th:text="${#temporals.format(project.startDate, 'yyyy/MM/dd')}">2026/01/01</span>
								<span th:unless="${project.startDate != null}">未設定</span>
								〜
								<span th:if="${project.endDate != null}"
									th:text="${#temporals.format(project.endDate, 'yyyy/MM/dd')}">2026/03/31</span>
								<span th:unless="${project.endDate != null}">未定</span>
							</span>
						</p>
					</div>
				</a>
			</div>

			<div class="empty-state" th:if="${projects == null or #lists.isEmpty(projects)}">
				<p>所属しているプロジェクトはまだありません。</p>
				<a href="/projects/create" class="btn btn-primary">最初のプロジェクトを作る</a>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
			<nav class="foot-links">
				<a href="/dashboard">ダッシュボード</a>
				<a href="/settings/integration">設定</a>
			</nav>
		</div>
	</footer>

</body>

</html>
