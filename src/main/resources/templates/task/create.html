<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>タスク新規作成 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a th:href="@{/projects/{projectId}/tasks(projectId=${projectId})}" class="btn btn-ghost">タスク一覧へ戻る</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-head">
				<h1>タスク新規作成</h1>
			</div>

			<form class="form-card" th:action="@{/projects/{projectId}/tasks/create(projectId=${projectId})}"
				method="post">

				<div class="form-field">
					<label for="title">タイトル <span style="color:#B8412C">*</span></label>
					<input type="text" id="title" name="title" required maxlength="255">
				</div>

				<div class="form-field">
					<label for="description">詳細</label>
					<textarea id="description" name="description" rows="4"></textarea>
				</div>

				<div class="form-row">
					<div class="form-field">
						<label for="priority">優先度</label>
						<select id="priority" name="priority">
							<option value="HIGH">高</option>
							<option value="MEDIUM" selected>中</option>
							<option value="LOW">低</option>
						</select>
					</div>
					<div class="form-field">
						<label for="assigneeId">担当者</label>
						<select id="assigneeId" name="assigneeId">
							<option value="">未アサイン</option>
							<option th:each="u : ${assignableUsers}" th:value="${u.id}" th:text="${u.name}"></option>
						</select>
					</div>
				</div>

				<div class="form-row">
					<div class="form-field">
						<label for="startDate">開始日</label>
						<input type="date" id="startDate" name="startDate">
					</div>
					<div class="form-field">
						<label for="dueDate">期限</label>
						<input type="date" id="dueDate" name="dueDate">
					</div>
				</div>

				<div class="form-field">
					<label for="planHours">見積工数（時間）</label>
					<input type="number" id="planHours" name="planHours" min="0">
				</div>

				<div class="form-actions">
					<button type="submit" class="btn btn-primary">作成する</button>
					<a th:href="@{/projects/{projectId}/tasks(projectId=${projectId})}" class="btn btn-ghost">キャンセル</a>
				</div>
			</form>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
		</div>
	</footer>
</body>

</html>ml>
