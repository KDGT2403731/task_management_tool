<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${project.name} + ' 分析レポート | 工程ノート'">分析レポート | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a th:href="@{/projects/{id}(id=${projectId})}" class="btn btn-ghost">プロジェクト詳細</a>
				<a th:href="@{/projects/{projectId}/tasks(projectId=${projectId})}" class="btn btn-ghost">タスク一覧</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-header">
				<div>
					<p class="eyebrow" th:text="${project.name}">プロジェクト名</p>
					<h1>分析レポート</h1>
				</div>
			</div>

			<!-- ===== サマリー ===== -->
			<div class="detail-meta" style="margin-bottom:28px;">
				<div class="meta-item">
					<span class="meta-label">担当者数</span>
					<span th:text="${summaries.size()}"></span>
				</div>
				<div class="meta-item">
					<span class="meta-label">タスク合計</span>
					<span th:text="${#aggregates.sum(summaries.![taskCount])} + '件'"></span>
				</div>
				<div class="meta-item">
					<span class="meta-label">見積工数合計</span>
					<span th:text="${#aggregates.sum(summaries.![planHoursTotal])} + 'h'"></span>
				</div>
				<div class="meta-item">
					<span class="meta-label">実績工数合計</span>
					<span th:text="${#aggregates.sum(summaries.![actualHoursTotal])} + 'h'"></span>
				</div>
			</div>

			<!-- ===== メンバー別工数 ===== -->
			<div class="panel">
				<div class="panel-head">
					<h2>メンバー別工数（見積 / 実績）</h2>
					<div class="hours-legend">
						<span>■ 見積</span>
						<span>■ 実績</span>
					</div>
				</div>

				<div>
					<div class="hours-row" th:each="s : ${summaries}">
						<span class="hours-name" th:text="${s.assigneeName}"></span>

						<div class="hours-bars">
							<div class="hours-bar-track">
								<div class="hours-bar-fill plan"
									th:style="'width:' + (${maxHours} == 0 ? 0 : (${s.planHoursTotal} * 100 / ${maxHours})) + '%'">
								</div>
							</div>
							<div class="hours-bar-track">
								<div class="hours-bar-fill actual"
									th:style="'width:' + (${maxHours} == 0 ? 0 : (${s.actualHoursTotal} * 100 / ${maxHours})) + '%'">
								</div>
							</div>
						</div>

						<div class="hours-nums">
							<div><strong th:text="${s.planHoursTotal}"></strong>h 見積 / <strong
									th:text="${s.actualHoursTotal}"></strong>h 実績</div>
							<div th:text="${s.taskCount} + '件のタスク'"></div>
						</div>
					</div>
				</div>

				<div class="empty-state" th:if="${#lists.isEmpty(summaries)}">
					<p>集計できるタスクがまだありません</p>
				</div>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
			<nav class="foot-links">
				<a href="/dashboard">ダッシュボード</a>
				<a href="/projects">プロジェクト</a>
			</nav>
		</div>
	</footer>
</body>

</html>
