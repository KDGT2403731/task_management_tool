<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${milestone.title} + ' | 工程ノート'">マイルストーン詳細 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a th:href="@{/projects/{projectId}/milestones(projectId=${projectId})}"
					class="btn btn-ghost">マイルストーン一覧</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="banner banner-error" th:if="${deleteError}">
				<span th:text="${deleteError}"></span>
			</div>

			<div class="detail-head">
				<div>
					<p class="eyebrow" th:text="${milestone.project != null ? milestone.project.name : ''}">プロジェクト名</p>
					<h1 th:text="${milestone.title}">マイルストーン名</h1>
				</div>
				<div class="detail-actions">
					<a th:href="@{/projects/{projectId}/milestones/{id}/edit(projectId=${projectId}, id=${milestone.id})}"
						class="btn btn-ghost">編集</a>
					<form
						th:action="@{/projects/{projectId}/milestones/{id}/delete(projectId=${projectId}, id=${milestone.id})}"
						method="post" onsubmit="return confirm('このマイルストーンを削除しますか？');">
						<button type="submit" class="btn btn-danger">削除</button>
					</form>
				</div>
			</div>

			<div class="detail-meta">
				<div class="meta-item">
					<span class="meta-label">Status</span>
					<span th:class="${'status-badge ' +
						(milestone.status == 'ACHIEVED' ? 'status-achieved' :
						(milestone.status == 'MISSED' ? 'status-missed' : 'status-open'))}" th:text="${milestone.status}"></span>
				</div>
				<div class="meta-item">
					<span class="meta-label">目標日</span>
					<span th:if="${milestone.targetDate != null}"
						th:text="${#temporals.format(milestone.targetDate, 'yyyy/MM/dd')}"></span>
					<span th:unless="${milestone.targetDate != null}">未設定</span>
				</div>
				<div class="meta-item">
					<span class="meta-label">紐づくタスク</span>
					<span th:text="(${milestone.tasks != null ? #lists.size(milestone.tasks) : 0}) + '件'"></span>
				</div>
			</div>

			<p class="detail-description" th:if="${milestone.description != null and !milestone.description.isEmpty()}"
				th:text="${milestone.description}">マイルストーンの説明文がここに入ります。</p>

			<!-- ===== ステータス変更 ===== -->
			<div class="panel">
				<div class="panel-head">
					<h2>ステータス変更</h2>
				</div>
				<form
					th:action="@{/projects/{projectId}/milestones/{id}/status(projectId=${projectId}, id=${milestone.id})}"
					method="post" class="task-actions">
					<button type="submit" name="status" value="OPEN" class="btn btn-ghost">未達成</button>
					<button type="submit" name="status" value="ACHIEVED" class="btn btn-ghost">達成</button>
					<button type="submit" name="status" value="MISSED" class="btn btn-ghost">見送り</button>
				</form>
			</div>

			<!-- ===== 紐づくタスク一覧 ===== -->
			<div class="panel" style="margin-top:24px;">
				<div class="panel-head">
					<h2>紐づくタスク</h2>
				</div>
				<ul class="milestone-list" th:if="${milestone.tasks != null and !#lists.isEmpty(milestone.tasks)}">
					<li class="milestone-item" th:each="task : ${milestone.tasks}">
						<div class="milestone-main">
							<p class="milestone-title">
								<a th:href="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.id})}"
									th:text="${task.title}" style="text-decoration:none; color:inherit;"></a>
							</p>
							<div class="milestone-meta">
								<span th:if="${task.dueDate != null}" th:text="'期限: ' + ${task.dueDate}"></span>
							</div>
						</div>
						<span class="status-badge"
							th:classappend="${task.status == 'DONE'} ? 'badge-done' : (${task.status == 'IN_PROGRESS'} ? 'badge-inprogress' : 'badge-todo')"
							th:text="${task.status == 'DONE'} ? '完了' : (${task.status == 'IN_PROGRESS'} ? '進行中' : '未着手')"></span>
					</li>
				</ul>

				<div class="empty-state" th:if="${milestone.tasks == null or #lists.isEmpty(milestone.tasks)}">
					<p>このマイルストーンに紐づくタスクはまだありません。</p>
				</div>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
			<nav class="foot-links">
				<a href="/dashboard">ダッシュボード</a>
				<a href="/projects">プロジェクト</a>
			</nav>
		</div>
	</footer>

</body>

</html>
