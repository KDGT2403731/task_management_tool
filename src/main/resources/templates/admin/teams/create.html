<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>新しいチーム | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/admin/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート 管理者</span>
			</a>
			<nav class="nav-actions">
				<a href="/admin/teams" class="btn btn-ghost">チーム一覧</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-header">
				<div>
					<p class="eyebrow">New team</p>
					<h1>新しいチーム</h1>
				</div>
			</div>

			<div class="form-card">
				<form th:action="@{/admin/teams/create}" method="post">
					<div class="form-field">
						<label for="name">チーム名</label>
						<input type="text" id="name" name="name" required autofocus>
					</div>
					<div class="form-actions">
						<button type="submit" class="btn btn-primary">作成する</button>
						<a href="/admin/teams" class="btn btn-ghost">キャンセル</a>
					</div>
				</form>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
		</div>
	</footer>

</body>

</html>
