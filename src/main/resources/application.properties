spring.application.name=taskmanagementtool

spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanagementdb

spring.datasource.driverClassName=org.postgresql.Driver

spring.datasource.username=postgres

spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none

spring.jpa.defer-datasource-initialization=true

# Thymeleaf のキャッシュを無効化（開発時のみ推奨。変更がすぐ画面に反映されます）
spring.thymeleaf.cache=false

spring.thymeleaf.prefix=classpath:/templates/

spring.thymeleaf.suffix=.html

spring.jpa.open-in-view=true

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.CharacterSet=utf8mb4

spring.jpa.properties.hibernate.jdbc.CharacterEncoding=utf8

server.servlet.session.tracking-modes=cookie

spring.servlet.encoding.charset=UTF-8

spring.servlet.encoding.force=true

spring.servlet.encoding.enabled=true

app.encryption.secret-key=AbJy0BroBeiujFthM2bLUerVmceT3rW9VvZUC9suUbE=

logging.level.org.springframework.security=DEBUG

spring.sql.init.mode=always

spring.sql.init.schema-locations=classpath:/schema.sql

spring.sql.init.data-locations=classpath:/data.sql

logging.level.org.apache.tomcat.util.net.Acceptor=OFF