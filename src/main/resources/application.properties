spring.application.name=taskmanagementtool

spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanagementdb

spring.datasource.driverClassName=org.postgresql.Driver

spring.datasource.username=postgres

spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=none

spring.jpa.defer-datasource-initialization=true

# Thymeleaf のキャッシュを無効化（開発時のみ推奨。変更がすぐ画面に反映されます）
spring.thymeleaf.cache=false

spring.thymeleaf.prefix=classpath:/templates/

spring.thymeleaf.suffix=.html

spring.jpa.open-in-view=true

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.CharacterSet=utf8mb4

spring.jpa.properties.hibernate.jdbc.CharacterEncoding=utf8

server.servlet.session.tracking-modes=cookie

spring.servlet.encoding.charset=UTF-8

spring.servlet.encoding.force=true

spring.servlet.encoding.enabled=true

# 本番相当のデフォルトでは絶対値を書かず、環境変数 APP_ENCRYPTION_SECRET_KEY から読む。
# ローカル開発時だけ application-dev.properties 側で具体値を上書きする。
app.encryption.secret-key=${APP_ENCRYPTION_SECRET_KEY}

logging.level.org.springframework.security=DEBUG

# 起動のたびにスキーマを全消去・再構築しないよう、デフォルトは初期化しない。
# ローカル開発でschema.sql/data.sqlを流したい場合は
# --spring.profiles.active=dev を付けて起動する（application-dev.propertiesが有効になる）。
spring.sql.init.mode=never

spring.sql.init.schema-locations=classpath:/schema.sql

spring.sql.init.data-locations=classpath:/data.sql

logging.level.org.apache.tomcat.util.net.Acceptor=OFF