<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ログイン | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a href="/signup" class="btn btn-ghost">新規登録</a>
			</nav>
		</div>
	</header>

	<main>
		<section class="auth-section">
			<div class="container">
				<div class="auth-card">
					<h1>ログイン</h1>
					<p class="auth-lead">メールアドレスとパスワードでログインしてください。</p>

					<div class="banner banner-error" th:if="${loginError}">
						<span th:text="${loginError}"></span>
					</div>

					<div class="banner banner-success" th:if="${message}">
						<span th:text="${message}"></span>
					</div>

					<form th:action="@{/login}" method="post">
						<div class="form-field">
							<label for="username">メールアドレス</label>
							<input type="email" id="username" name="username" required autofocus autocomplete="email">
						</div>
						<div class="form-field">
							<label for="password">パスワード</label>
							<input type="password" id="password" name="password" required
								autocomplete="current-password">
						</div>
						<button type="submit" class="btn btn-primary">ログイン</button>
					</form>

					<p class="auth-switch">
						アカウントをお持ちでない方は <a href="/signup">新規登録</a>
					</p>
				</div>
			</div>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
			<nav class="foot-links">
				<a href="/login">ログイン</a>
				<a href="/signup">新規登録</a>
			</nav>
		</div>
	</footer>

</body>

</html>
