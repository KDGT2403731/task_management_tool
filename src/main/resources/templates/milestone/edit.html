<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>マイルストーンを編集 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a th:href="@{/projects/{projectId}/milestones/{id}(projectId=${projectId}, id=${milestone.id})}" class="btn btn-ghost">マイルストーン詳細</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-header">
				<div>
					<p class="eyebrow">Edit milestone</p>
					<h1 th:text="${milestone.title}">マイルストーン名</h1>
				</div>
			</div>

			<div class="form-card">
				<form th:action="@{/projects/{projectId}/milestones/{id}/edit(projectId=${projectId}, id=${milestone.id})}" method="post">
					<div class="form-field">
						<label for="title">タイトル</label>
						<input type="text" id="title" name="title" th:value="${milestone.title}" required autofocus maxlength="255">
					</div>
					<div class="form-field">
						<label for="targetDate">目標日</label>
						<input type="date" id="targetDate" name="targetDate" th:value="${milestone.targetDate}">
					</div>
					<div class="form-field">
						<label for="description">説明</label>
						<textarea id="description" name="description" th:text="${milestone.description}"></textarea>
					</div>
					<div class="form-field">
						<label for="status">ステータス</label>
						<select id="status" name="status">
							<option th:each="s : ${statuses}" th:value="${s}"
									th:text="${s == 'ACHIEVED'} ? '達成' : (${s == 'MISSED'} ? '見送り' : '未達成')"
									th:selected="${s == milestone.status}"></option>
						</select>
					</div>
					<div class="form-actions">
						<button type="submit" class="btn btn-primary">保存する</button>
						<a th:href="@{/projects/{projectId}/milestones/{id}(projectId=${projectId}, id=${milestone.id})}" class="btn btn-ghost">キャンセル</a>
					</div>
				</form>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
			<nav class="foot-links">
				<a href="/dashboard">ダッシュボード</a>
				<a href="/projects">プロジェクト</a>
			</nav>
		</div>
	</footer>

</body>

</html>
