<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${task.title} + ' | 工程ノート'">タスク編集 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<header class="site-header">
		<div class="container">
			<a href="/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート</span>
			</a>
			<nav class="nav-actions">
				<a th:href="@{/projects/{id}(id=${projectId})}" class="btn btn-ghost">プロジェクトへ戻る</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>
	<div class="container page-main">
		<h1 th:text="'タスク編集: ' + ${task.title}">タスク編集</h1>
		<form th:action="@{/projects/{projectId}/tasks/{taskId}/update(projectId=${projectId},taskId=${task.id})}"
			method="post">
			<div class="form-group">
				<label for="title">タイトル</label>
				<input type="text" id="title" name="title" th:value="${task.title}" required>
			</div>
			<div class="form-group">
				<label for="description">説明</label>
				<textarea id="description" name="description" rows="5" required
					th:text="${task.description}"></textarea>
			</div>
			<div class="form-group">
				<label for="status">ステータス</label>
				<select id="status" name="status" required>
					<option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"
						th:selected="${status == task.status}"></option>
				</select>
			</div>
			<div class="form-group">
				<label for="priority">優先度</label>
				<select id="priority" name="priority" required>
					<option th:each="priority : ${priorities}" th:value="${priority}" th:text="${priority}"
						th:selected="${priority == task.priority}"></option>
				</select>
			</div>
			<div class="form-group">
				<label for="assignee">担当者</label>
				<select id="assignee" name="assigneeId">
					<option value="">未割当</option>
					<option th:each="user : ${users}" th:value="${user.id}" th:text="${user.name}"
						th:selected="${user.id == task.assignee?.id}"></option>
				</select>
			</div>
			<div class="form-group">
				<label for="dueDate">期限</label>
				<input type="date" id="dueDate" name="dueDate"
					th:value="${task.dueDate != null ? #dates.format(task.dueDate,'yyyy-MM-dd') : ''}">
			</div>
			<button type="submit" class="btn btn-primary">更新
</body>

</html>
