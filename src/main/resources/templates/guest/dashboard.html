<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ゲストダッシュボード | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/guest/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート ゲスト</span>
			</a>
			<nav class="nav-actions">
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="dashboard-hero">
				<div>
					<p class="eyebrow">Guest</p>
					<h1 th:text="'ようこそ、' + ${username} + ' さん'">ゲストダッシュボード</h1>
				</div>
			</div>

			<p class="detail-description">
				ゲストとして招待されたプロジェクトのタスクとガントチャートを閲覧できます。編集はできません。
			</p>

			<div class="nav-card-grid">
				<a class="nav-card" href="/guest/tasks">
					<p class="nav-card-title">タスク一覧</p>
					<p class="nav-card-desc">閲覧専用のタスク一覧（カンバン表示）</p>
				</a>
				<a class="nav-card" href="/guest/tasks/gantt">
					<p class="nav-card-title">ガントチャート</p>
					<p class="nav-card-desc">閲覧専用のスケジュール表示</p>
				</a>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
		</div>
	</footer>

</body>

</html>
