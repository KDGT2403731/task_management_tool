<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ユーザー管理 | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/admin/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート 管理者</span>
			</a>
			<nav class="nav-actions">
				<a href="/admin/dashboard" class="btn btn-ghost">ダッシュボード</a>
				<a href="/admin/teams" class="btn btn-ghost">チーム管理</a>
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="page-header">
				<div>
					<p class="eyebrow">Admin / Users</p>
					<h1>ユーザー管理</h1>
				</div>
			</div>

			<div class="panel">
				<ul class="milestone-list" th:if="${users != null and !#lists.isEmpty(users)}">
					<li class="milestone-item" th:each="user : ${users}">
						<div class="milestone-main">
							<p class="milestone-title">
								<a th:href="@{/admin/users/{id}(id=${user.id})}" th:text="${user.name}"
								   style="text-decoration:none; color:inherit;"></a>
							</p>
							<div class="milestone-meta">
								<span th:text="${user.email}"></span>
								<span th:if="${user.team != null}" th:text="${user.team.name}"></span>
							</div>
						</div>
						<span th:text="${user.role}"></span>
					</li>
				</ul>

				<div class="empty-state" th:if="${users == null or #lists.isEmpty(users)}">
					<p>登録されているユーザーがいません。</p>
				</div>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
		</div>
	</footer>

</body>

</html>
