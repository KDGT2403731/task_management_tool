<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>管理者ダッシュボード | 工程ノート</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

	<header class="site-header">
		<div class="container">
			<a href="/admin/dashboard" class="brand">
				<span class="brand-mark">Kotei</span>
				<span class="brand-sub">工程ノート 管理者</span>
			</a>
			<nav class="nav-actions">
				<form class="logout-form" th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-ghost">ログアウト</button>
				</form>
			</nav>
		</div>
	</header>

	<main class="app-main">
		<div class="container">

			<div class="dashboard-hero">
				<div>
					<p class="eyebrow">Admin</p>
					<h1 th:text="'おかえりなさい、' + ${username} + ' さん'">管理者ダッシュボード</h1>
				</div>
				<div class="detail-meta" style="margin-bottom:0;">
					<div class="meta-item">
						<span class="meta-label">ユーザー数</span>
						<span th:text="${totalUsers}"></span>
					</div>
					<div class="meta-item">
						<span class="meta-label">チーム数</span>
						<span th:text="${totalTeams}"></span>
					</div>
				</div>
			</div>

			<div class="nav-card-grid">
				<a class="nav-card" href="/admin/users">
					<p class="nav-card-title">ユーザー管理</p>
					<p class="nav-card-desc">ユーザーの登録・一覧・ロール変更</p>
				</a>
				<a class="nav-card" href="/admin/teams">
					<p class="nav-card-title">チーム・部署管理</p>
					<p class="nav-card-desc">組織、チーム、部署の作成・所属設定</p>
				</a>
				<a class="nav-card" href="/admin/system">
					<p class="nav-card-title">システム管理</p>
					<p class="nav-card-desc">アプリケーション全体の環境設定等</p>
				</a>
			</div>

		</div>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 工程ノート</p>
		</div>
	</footer>

</body>

</html>
